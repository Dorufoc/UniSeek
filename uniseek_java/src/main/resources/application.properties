# ===========================================
# Server 配置
# ===========================================
server.port=8080

# ===========================================
# MySQL DataSource
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/uniseek?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# MyBatis 配置
# ===========================================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.uniseek.entity

# ===========================================
# PageHelper 分页插件
# ===========================================
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true

# ===========================================
# JWT 配置
# ===========================================
jwt.secret=UniSeekSecretKey2026
jwt.expiration=1800000
